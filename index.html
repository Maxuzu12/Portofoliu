<script>

/* DARK MODE */
function darkMode(){
  document.body.classList.toggle("dark");
}

/* LOADER */
window.addEventListener("load", () => {
  document.getElementById("loader").style.display="none";
  document.body.classList.add("show-page");
});

/* CURSOR */
const cursor = document.querySelector(".cursor");

let mouse = {
  x: null,
  y: null
};

document.addEventListener("mousemove", e => {
  // cursor
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";

  // particles
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});


/* HOVER EFFECT */
document.querySelectorAll("a,button").forEach(el=>{
  el.addEventListener("mouseenter",()=>cursor.classList.add("hover"));
  el.addEventListener("mouseleave",()=>cursor.classList.remove("hover"));
});

/* PARALLAX */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*40;
  let y=(e.clientY/window.innerHeight-0.5)*40;
  document.body.style.setProperty("--moveX",x+"px");
  document.body.style.setProperty("--moveY",y+"px");
});

/* PROGRESS */
window.addEventListener("scroll", ()=>{
  let s=document.documentElement.scrollTop;
  let h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  document.getElementById("progress").style.width=(s/h)*100+"%";
});

/* FADE */
const els=document.querySelectorAll(".fade-in");

window.addEventListener("scroll",()=>{
  els.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add("show");
    }
  });
});

/* TYPING */ 

const texte = [
  "Front End Developer ",
  "Construiesc experiente web moderne",
  "Acesta e începutul "
];
  
let i=0,j=0,del=false;

function type(){
  let el = document.getElementById("typing");
  let emoji = document.getElementById("emoji");
  let txt = texte[i];

  if(!del){
    el.textContent = txt.substring(0, j);
    j++;

    emoji.textContent = j > 0 ? "🚀" : "";

    if(j > txt.length){
      del = true;
      setTimeout(type, 1000);
      return;
    }

  } else {
    j--;
    el.textContent = txt.substring(0, j);

  emoji.textContent = j > 0 ? "🚀" : "";

    if(j <= 0){
      del = false;
      i = (i + 1) % texte.length;
    }
  }

  setTimeout(type, del ? 30 : 80);
}

type();

window.addEventListener("load", () => {
  document.getElementById("topBtn").onclick = () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
});

window.addEventListener("scroll", () => {
  const btn = document.getElementById("topBtn");

  let scrollTop = document.documentElement.scrollTop;
  let scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  let percent = (scrollTop / scrollHeight) * 100;

  btn.style.background = `conic-gradient(#2a5cff ${percent}%, #e0e0e0 ${percent}%)`;

  if (window.scrollY > 200) {
    btn.style.display = "flex";
  } else {
    btn.style.display = "none";
  }
});

console.log("j:", j);

const form = document.querySelector("form");
const toast = document.getElementById("toast");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = new FormData(form);

  const res = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: {
      'Accept': 'application/json'
    }
  });

  if (res.ok) {
    toast.classList.add("show");
    form.reset();

    setTimeout(() => {
      toast.classList.remove("show");
    }, 3000);
  }
});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

const hero = document.querySelector(".hero");

function resizeCanvas() {
  canvas.width = hero.offsetWidth;
  canvas.height = hero.offsetHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

let particles = [];

for(let i=0;i<50;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: (Math.random()-0.5),
    dy: (Math.random()-0.5)
  });
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
  p.x += p.dx;
  p.y += p.dy;

  if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
  if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

  // 🔥 FIX
  if(mouse.x !== null && mouse.y !== null){
    let dxMouse = p.x - mouse.x;
    let dyMouse = p.y - mouse.y;
    let distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);

    if(distMouse < 120){
      p.x -= dxMouse * 0.02;
      p.y -= dyMouse * 0.02;
    }
  }

  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle="rgba(42,92,255,0.5)";
  ctx.fill();
});

  

  // 🔥 LINIi între particule
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 100){
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = "rgba(42,92,255,0.15)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

const reveals = document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=> {
reveals.forEach(el => {const top = el.getBoundingClientRect().top;
  if(top < window.innerHeight - 100){
    el.classList.add("active");
  }
})
});
const cards =
document.querySelectorAll(".proiect-card");

cards.forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();

    card.style.setProperty("--x", (e.clientX - rect.left) + "px");
    card.style.setProperty("--y", (e.clientY - rect.top) + "px");
  });
});
  
cards.forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = -(y - centerY) / 10;
    const rotateY = (x - centerX) / 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0)";
  });
});

window.addEventListener("scroll", () => {
  const scrollTop = window.scrollY;
  const height = document.documentElement.scrollHeight - window.innerHeight;
  const progress = (scrollTop / height) * 100;

});

const buttons = document.querySelectorAll("button");

buttons.forEach(btn => {
  btn.addEventListener("mousemove", e => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0, 0)";
  });
});


window.addEventListener("scroll", () => {
  let current = "";

  sections.forEach(section => {
    const sectionTop = section.offsetTop;
    if (window.scrollY >= sectionTop - 100) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link => {
    link.classList.remove("active");
    if (link.getAttribute("href") === "#" + current) {
      link.classList.add("active");
    }
  });
});

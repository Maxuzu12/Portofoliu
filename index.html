<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<title>Sunt din Romania si imi place sa codez</title>

<style>

/* PARALLAX BG */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, #2a5cff22, transparent),
              radial-gradient(circle at top left, #00c6ff22, transparent);
  z-index: -1;
  transform: translate(var(--moveX,0), var(--moveY,0));
  transition: transform 0.1s;
}

/* BODY */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #f0f4ff, #ffffff);
  cursor: none;
  opacity: 0;
  transition: 0.8s;
}

body.show-page {
  opacity: 1;
}

body.dark {
  background: #121212;
  color: white;
}

/* CURSOR */
.cursor {
  width: 15px;
  height: 15px;
  background: #2a5cff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease, background 0.3s;
}

.cursor.hover {
  transform: scale(2);
  background: #00c6ff;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.7);
  z-index: 1000;
}

.dark nav {
  background: rgba(30,30,30,0.7);
}

nav a {
  text-decoration: none;
  font-weight: bold;
  color: black;
  position: relative;
}

.dark nav a {
  color: white;
}

nav a::after {
  content: "";
  width: 0%;
  height: 2px;
  background: #2a5cff;
  position: absolute;
  bottom: 0;
  left: 0;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-size: 48px;
  color: white;
  text-shadow: 0 0 10px rgba(42,92,255,0.7),
               0 0 20px rgba(42,92,255,0.5);
}

.subtitle {
  opacity: 0.7;
}

.hero::before,
.hero::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  filter: blur(80px);
}

.hero::before {
  background: radial-gradient(circle, #2a5cff, transparent);
  top: -100px;
  left: -100px;
  animation: moveBg 6s infinite alternate;
}

.hero::after {
  background: radial-gradient(circle, #00c6ff, transparent);
  bottom: -100px;
  right: -100px;
  animation: moveBg 8s infinite alternate;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(50px,50px); }
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(45deg, #2a5cff, #6a8cff);
  color: white;
  text-decoration: none;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
}

/* SECTIONS */
section {
  padding: 80px 20px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 30px;
}

.dark .card {
  background: #1e1e1e;
}

/* PROIECTE */
.proiecte-container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap: 30px;
}

.proiect-card {
  position: relative;
  padding: 20px;
  border-radius: 16px;
  background: white;
  overflow: hidden;
  transition: transform 0.3s;
}

.proiect-card img {
  width: 100%;
  border-radius: 10px;
}

.proiect-card:hover {
  transform: translateY(-10px) scale(1.02);
}

.dark .proiect-card {
  background: #1e1e1e;
}

/* FADE */
.fade-in {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PROGRESS */
#progress {
  position: fixed;
  top: 0;
  height: 5px;
  width: 0%;
  background: #2a5cff;
}

</style>
</head>

<body>

<div class="cursor"></div>
<div id="progress"></div>

<div id="loader">Loading...</div>

<nav>
  <a href="#acasa">Acasa</a>
  <a href="#despre">Despre</a>
  <a href="#proiecte">Proiecte</a>
</nav>

<button onclick="darkMode()">Dark Mode</button>

<section class="hero fade-in">
  <h1 id="typing"></h1>
  <p class="subtitle">Front-End Developer 🚀</p>
  <a href="#proiecte" class="btn">Vezi proiectele</a>
</section>

<section class="card fade-in" id="acasa">
  <h2>Acasa</h2>
  <p>Primul meu site</p>
</section>

<section class="card fade-in" id="despre">
  <h2>Despre</h2>
  <p>Sunt din Romania si vreau sa devin mai bun la coding.</p>
</section>

<section class="card fade-in" id="proiecte">
  <h2>Proiecte</h2>

  <div class="proiecte-container">
    <div class="proiect-card fade-in">
      <img src="https://picsum.photos/300/150">
      <h3>Proiect 1</h3>
    </div>

    <div class="proiect-card fade-in">
      <img src="https://picsum.photos/300/150">
      <h3>Proiect 2</h3>
    </div>
  </div>

</section>

<script>

/* DARK MODE */
function darkMode(){
  document.body.classList.toggle("dark");
}

/* LOADER */
window.addEventListener("load", () => {
  document.getElementById("loader").style.display="none";
  document.body.classList.add("show-page");
});

/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* HOVER EFFECT */
document.querySelectorAll("a,button").forEach(el=>{
  el.addEventListener("mouseenter",()=>cursor.classList.add("hover"));
  el.addEventListener("mouseleave",()=>cursor.classList.remove("hover"));
});

/* PARALLAX */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*40;
  let y=(e.clientY/window.innerHeight-0.5)*40;
  document.body.style.setProperty("--moveX",x+"px");
  document.body.style.setProperty("--moveY",y+"px");
});

/* PROGRESS */
window.addEventListener("scroll", ()=>{
  let s=document.documentElement.scrollTop;
  let h=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  document.getElementById("progress").style.width=(s/h)*100+"%";
});

/* FADE */
const els=document.querySelectorAll(".fade-in");

window.addEventListener("scroll",()=>{
  els.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add("show");
    }
  });
});

/* TYPING */
const texte=["Bine ai venit 🚀","Construiesc proiecte 💻","Acesta e începutul 🔥"];
let i=0,j=0,del=false;

function type(){
  let el=document.getElementById("typing");
  let txt=texte[i];

  if(!del){
    el.innerHTML=txt.substring(0,j++);
    if(j==txt.length){del=true;setTimeout(type,1000);return;}
  } else {
    el.innerHTML=txt.substring(0,j--);
    if(j==0){del=false;i=(i+1)%texte.length;}
  }

  setTimeout(type,del?30:80);
}

type();

</script>

</body>
</html>
